<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d1b26">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sparks">
  <title>Sparks - AI-ready Capture</title>
  <link rel="manifest" href="./manifest.webmanifest">

  <link rel="apple-touch-icon" href="./assets/icon.svg">
  <link rel="stylesheet" href="./src/styles/app.css">

<body>

    <main class="noscript-card">
      <h1>Sparks needs JavaScript</h1>

  <input id="photo-input" class="visually-hidden" type="file" accept="image/*" capture="environment">

  <script type="module" src="./src/app.js"></script>
